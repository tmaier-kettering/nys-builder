<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYS Policy Builder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>NYS Climate Policy Builder</h1>
      <p class="subtitle">Explore policies by depth, grouping, and issue focus.</p>
    </header>

    <main class="layout">
      <aside class="controls-panel" aria-label="Filters and grouping controls">
        <h2>Display Controls</h2>

        <label for="viewLevel">View level</label>
        <select id="viewLevel" name="viewLevel">
          <option value="skim">Skim</option>
          <option value="peruse">Peruse</option>
          <option value="deep-dive">Deep dive</option>
        </select>

        <label for="groupBy">Group by</label>
        <select id="groupBy" name="groupBy">
          <option value="scope">Scope</option>
          <option value="type">Type</option>
          <option value="issueAreas">Issue Areas</option>
        </select>

        <label for="filterScope">Filter by scope</label>
        <select id="filterScope" name="filterScope"></select>

        <label for="filterType">Filter by type</label>
        <select id="filterType" name="filterType"></select>

        <label for="filterIssue">Filter by issue area</label>
        <select id="filterIssue" name="filterIssue"></select>
      </aside>

      <section class="main-display" aria-label="Policy cards">
        <div class="display-actions">
          <label class="select-all-wrap">
            <input type="checkbox" id="selectAllVisible" />
            <span>Select all visible cards</span>
          </label>

          <div class="action-buttons">
            <button id="shareLinkBtn" type="button">Share Link</button>
            <button id="downloadPdfBtn" type="button">Download PDF</button>
          </div>
        </div>

        <div id="sharedModeBanner" class="shared-banner" hidden>
          Shared view active: only selected cards are shown.
        </div>

        <div id="cardsContainer" class="cards-container"></div>
      </section>
    </main>

    <footer class="page-footer">Built for policy exploration and action planning.</footer>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
