<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYS Builder Policies</title>
    <link rel="stylesheet" href="./theme.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <h1>NYS Builder Policy Explorer</h1>
      <p class="subtitle">Browse, group, filter, and export policy recommendations.</p>

      <div class="content">
        <aside class="sidebar">
          <h2>Options</h2>
          <div class="control">
            <label for="viewMode">View level</label>
            <select id="viewMode">
              <option value="skim">Skim</option>
              <option value="peruse">Peruse</option>
              <option value="deep-dive">Deep Dive</option>
            </select>
          </div>
          <div class="control">
            <label for="groupBy">Group cards by</label>
            <select id="groupBy">
              <option value="scope">Scope</option>
              <option value="type">Type</option>
              <option value="issueAreas">Issue Areas</option>
            </select>
          </div>
          <div class="control">
            <label for="filterScope">Filter by scope</label>
            <select id="filterScope"></select>
          </div>
          <div class="control">
            <label for="filterType">Filter by type</label>
            <select id="filterType"></select>
          </div>
          <div class="control">
            <label for="filterIssueArea">Filter by issue area</label>
            <select id="filterIssueArea"></select>
          </div>
        </aside>

        <main class="main">
          <div class="main-controls">
            <label>
              <input id="selectAllVisible" type="checkbox" />
              Select all visible cards
            </label>
            <div>
              <button id="shareBtn" type="button">Share selected view</button>
              <button id="pdfBtn" type="button">Download selected PDF</button>
            </div>
          </div>
          <div id="policyGroups"></div>
        </main>
      </div>

      <footer>Built from policies.csv and actions.csv</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="./data.js"></script>
    <script>
      const els = {
        viewMode: document.getElementById('viewMode'),
        groupBy: document.getElementById('groupBy'),
        filterScope: document.getElementById('filterScope'),
        filterType: document.getElementById('filterType'),
        filterIssueArea: document.getElementById('filterIssueArea'),
        selectAllVisible: document.getElementById('selectAllVisible'),
        shareBtn: document.getElementById('shareBtn'),
        pdfBtn: document.getElementById('pdfBtn'),
        policyGroups: document.getElementById('policyGroups')
      };

      const state = {
        policies: [],
        actionsById: new Map(),
        selectedPolicyIds: new Set(),
        visiblePolicyIds: [],
        onlySelectedFromLink: false
      };
      const ACTION_ID_PATTERN = /^A\d+/i;
      const POLICY_ID_PATTERN = /^P\d+/i;
      const MISSING_ACTION_LABEL = '(not found)';
      const PDF_FILE_PREFIX = 'selected-policies';
      const PDF_PAGE_MARGIN = 40;
      const PDF_LINE_HEIGHT = 14;
      const PDF_CONTENT_BOTTOM_MARGIN = 75;
      const PDF_TOC_TITLE_SIZE = 22;
      const PDF_FOOTER_TEXT_SIZE = 10;
      const PDF_LOGO_MAX_WIDTH = 90;
      const PDF_ASSETS = {
        firstPage: './assets/first_page.pdf',
        tableOfContentsBackground: './assets/table_of_contents_background.svg',
        logo: './assets/LCOY_USA_Logo.png'
      };
      const fallbackData = window.NYS_BUILDER_FALLBACK_DATA || {};

      // Lightweight CSV parser handling quoted fields, escaped quotes, and mixed line endings.
      function parseCsv(text) {
        const rows = [];
        let cur = '';
        let row = [];
        let inQuotes = false;

        for (let i = 0; i < text.length; i += 1) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              cur += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push(cur.trim());
            cur = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && next === '\n') {
              i += 1;
            }
            row.push(cur.trim());
            cur = '';
            if (row.some((item) => item.length > 0)) {
              rows.push(row);
            }
            row = [];
          } else {
            cur += char;
          }
        }

        if (cur.length || row.some((item) => item.length > 0)) {
          row.push(cur.trim());
          rows.push(row);
        }

        return rows;
      }

      function splitMulti(value) {
        return (value || '')
          .split(',')
          .map((v) => v.trim())
          .filter(Boolean);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function normalizePdfText(value) {
        return String(value ?? '').replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, ' ').trim();
      }

      function formatPdfValue(value) {
        const normalized = normalizePdfText(value);
        return normalized || 'N/A';
      }

      function buildPdfFilename() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const today = `${year}-${month}-${day}`;
        return `${PDF_FILE_PREFIX}-${els.viewMode.value}-${today}.pdf`;
      }

      function buildFilterOptions(values) {
        return ['All', ...[...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b))];
      }

      async function fetchAssetBytes(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`Failed to load ${path}: HTTP ${response.status}`);
        }
        return new Uint8Array(await response.arrayBuffer());
      }

      async function loadSvgAsPngBytes(path, width, height) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`Failed to load ${path}: HTTP ${response.status}`);
        }

        const svgText = await response.text();
        const blob = new Blob([svgText], { type: 'image/svg+xml' });
        const objectUrl = URL.createObjectURL(blob);

        try {
          const image = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error(`Unable to decode SVG asset at ${path}`));
            img.src = objectUrl;
          });

          const canvas = document.createElement('canvas');
          canvas.width = Math.ceil(width);
          canvas.height = Math.ceil(height);
          const context = canvas.getContext('2d');
          if (!context) {
            throw new Error('Unable to initialize canvas context for TOC background rendering.');
          }

          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/png');
          const base64 = dataUrl.split(',')[1] || '';
          return Uint8Array.from(atob(base64), (char) => char.charCodeAt(0));
        } finally {
          URL.revokeObjectURL(objectUrl);
        }
      }

      function splitTextForPdf(text, font, fontSize, maxWidth) {
        const value = formatPdfValue(text);
        const result = [];
        const paragraphs = value.split(/\r?\n/);

        paragraphs.forEach((paragraph, paragraphIndex) => {
          const words = paragraph.trim().split(/\s+/).filter(Boolean);

          if (!words.length) {
            result.push('');
          } else {
            let line = words[0];
            for (let i = 1; i < words.length; i += 1) {
              const candidate = `${line} ${words[i]}`;
              if (font.widthOfTextAtSize(candidate, fontSize) <= maxWidth) {
                line = candidate;
              } else {
                result.push(line);
                line = words[i];
              }
            }
            result.push(line);
          }

          if (paragraphIndex < paragraphs.length - 1 && result[result.length - 1] !== '') {
            result.push('');
          }
        });

        return result;
      }

      function downloadPdfBlob(bytes, filename) {
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = filename;
        document.body.append(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function setSelectOptions(selectEl, options) {
        const current = selectEl.value;
        selectEl.replaceChildren();
        options.forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          selectEl.append(option);
        });
        if (options.includes(current)) {
          selectEl.value = current;
        }
      }

      function getFilteredPolicies() {
        let filtered = state.policies.filter((policy) => {
          const scopePass = els.filterScope.value === 'All' || policy.scope === els.filterScope.value;
          const typePass = els.filterType.value === 'All' || policy.type === els.filterType.value;
          const issuePass =
            els.filterIssueArea.value === 'All' || policy.issueAreas.includes(els.filterIssueArea.value);
          return scopePass && typePass && issuePass;
        });

        if (state.onlySelectedFromLink) {
          filtered = filtered.filter((policy) => state.selectedPolicyIds.has(policy.id));
        }

        return filtered;
      }

      function buildGroups(policies) {
        const groups = new Map();
        const keyName = els.groupBy.value;

        policies.forEach((policy) => {
          const keys =
            keyName === 'issueAreas'
              ? (policy.issueAreas.length ? policy.issueAreas : ['Unspecified'])
              : [policy[keyName] || 'Unspecified'];

          keys.forEach((key) => {
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(policy);
          });
        });

        return [...groups.entries()].sort(([a], [b]) => a.localeCompare(b));
      }

      function cardHtml(policy) {
        const policyId = escapeHtml(policy.id);
        const checked = state.selectedPolicyIds.has(policy.id) ? 'checked' : '';
        const showCommentary = ['peruse', 'deep-dive'].includes(els.viewMode.value);
        const showActions = els.viewMode.value === 'deep-dive';

        const relatedTitles = policy.actionIds
          .map((id) => state.actionsById.get(id) || `${escapeHtml(id)} ${MISSING_ACTION_LABEL}`);

        return `
          <article class="card" data-policy-id="${policyId}">
            <div class="card-header">
              <input class="card-checkbox" type="checkbox" data-policy-id="${policyId}" ${checked} />
              <h4 class="card-title">${policyId}</h4>
            </div>
            <div class="field"><strong>Policy:</strong> ${policy.policyText ? escapeHtml(policy.policyText) : '<span class="muted">N/A</span>'}</div>
            <div class="field"><strong>Scope:</strong> ${policy.scope ? escapeHtml(policy.scope) : '<span class="muted">N/A</span>'}</div>
            <div class="field"><strong>Type:</strong> ${policy.type ? escapeHtml(policy.type) : '<span class="muted">N/A</span>'}</div>
            <div class="field"><strong>Issue Areas:</strong> ${policy.issueAreas.length ? escapeHtml(policy.issueAreas.join(', ')) : '<span class="muted">N/A</span>'}</div>
            ${
              showCommentary
                ? `<div class="field"><strong>Commentary:</strong> ${policy.commentary ? escapeHtml(policy.commentary) : '<span class="muted">N/A</span>'}</div>`
                : ''
            }
            ${
              showActions
                ? `<div class="field"><strong>Related Actions:</strong> ${
                    relatedTitles.length ? escapeHtml(relatedTitles.join('; ')) : '<span class="muted">N/A</span>'
                  }</div>`
                : ''
            }
          </article>
        `;
      }

      function updateSelectAllVisible() {
        const ids = state.visiblePolicyIds;
        if (!ids.length) {
          els.selectAllVisible.checked = false;
          els.selectAllVisible.indeterminate = false;
          return;
        }

        const selectedCount = ids.filter((id) => state.selectedPolicyIds.has(id)).length;
        els.selectAllVisible.checked = selectedCount === ids.length;
        els.selectAllVisible.indeterminate = selectedCount > 0 && selectedCount < ids.length;
      }

      function render() {
        const filtered = getFilteredPolicies();
        const groups = buildGroups(filtered);
        state.visiblePolicyIds = [...new Set(filtered.map((p) => p.id))];

        if (!groups.length) {
          els.policyGroups.innerHTML = '<p class="muted">No cards match the current filters.</p>';
          updateSelectAllVisible();
          return;
        }

        els.policyGroups.innerHTML = groups
          .map(
            ([title, policies]) => `
              <section class="group">
                <h3>${escapeHtml(title)}</h3>
                <div class="cards">
                  ${policies.map(cardHtml).join('')}
                </div>
              </section>
            `
          )
          .join('');

        document.querySelectorAll('.card-checkbox').forEach((checkbox) => {
          checkbox.addEventListener('change', (event) => {
            const id = event.target.getAttribute('data-policy-id');
            if (event.target.checked) {
              state.selectedPolicyIds.add(id);
            } else {
              state.selectedPolicyIds.delete(id);
            }
            updateSelectAllVisible();
          });
        });

        updateSelectAllVisible();
      }

      function copyShareLink() {
        if (!state.selectedPolicyIds.size) {
          alert('Select at least one card first.');
          return;
        }

        const url = new URL(window.location.href);
        url.searchParams.set('view', els.viewMode.value);
        url.searchParams.set('selected', [...state.selectedPolicyIds].join(','));
        url.searchParams.set('onlySelected', '1');

        const link = url.toString();

        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(link).then(
            () => alert('Share link copied to clipboard.'),
            () => prompt('Clipboard unavailable - copy this share link manually:', link)
          );
        } else {
          prompt('Clipboard unavailable - copy this share link manually:', link);
        }
      }

      async function downloadPdf() {
        const selectedPolicies = state.policies.filter((policy) => state.selectedPolicyIds.has(policy.id));
        if (!selectedPolicies.length) {
          alert('Select at least one card first.');
          return;
        }

        const grouped = buildGroups(selectedPolicies);
        const pdfLib = window.PDFLib;
        if (!pdfLib?.PDFDocument || !pdfLib?.StandardFonts || !pdfLib?.rgb) {
          alert('PDF download is temporarily unavailable. Please refresh and try again.');
          return;
        }

        try {
          const { PDFDocument, StandardFonts, rgb } = pdfLib;
          const pdfDoc = await PDFDocument.create();
          const coverPdfBytes = await fetchAssetBytes(PDF_ASSETS.firstPage);
          const coverSource = await PDFDocument.load(coverPdfBytes);
          const [coverPage] = await pdfDoc.copyPages(coverSource, [0]);
          pdfDoc.addPage(coverPage);

          const pageWidth = 612;
          const pageHeight = 792;
          const textWidth = pageWidth - PDF_PAGE_MARGIN * 2;
          const helvetica = await pdfDoc.embedFont(StandardFonts.Helvetica);
          const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
          const logoBytes = await fetchAssetBytes(PDF_ASSETS.logo);
          const logoImage = await pdfDoc.embedPng(logoBytes);
          const logoScale = Math.min(1, PDF_LOGO_MAX_WIDTH / logoImage.width);
          const logoWidth = logoImage.width * logoScale;
          const logoHeight = logoImage.height * logoScale;
          const tocBackgroundBytes = await loadSvgAsPngBytes(
            PDF_ASSETS.tableOfContentsBackground,
            pageWidth,
            pageHeight
          );
          const tocBackground = await pdfDoc.embedPng(tocBackgroundBytes);

          const tocPage = pdfDoc.addPage([pageWidth, pageHeight]);
          tocPage.drawImage(tocBackground, { x: 0, y: 0, width: pageWidth, height: pageHeight });
          tocPage.drawText('Table of Contents', {
            x: PDF_PAGE_MARGIN,
            y: pageHeight - PDF_PAGE_MARGIN - PDF_TOC_TITLE_SIZE,
            size: PDF_TOC_TITLE_SIZE,
            font: helveticaBold,
            color: rgb(0.08, 0.2, 0.4)
          });

          let page = pdfDoc.addPage([pageWidth, pageHeight]);
          let cursorY = pageHeight - PDF_PAGE_MARGIN;
          const groupStartPages = new Map();
          const contentPages = [page];

          const ensureSpace = (requiredHeight = PDF_LINE_HEIGHT) => {
            if (cursorY - requiredHeight < PDF_CONTENT_BOTTOM_MARGIN) {
              page = pdfDoc.addPage([pageWidth, pageHeight]);
              contentPages.push(page);
              cursorY = pageHeight - PDF_PAGE_MARGIN;
            }
          };

          const writeWrapped = (text, options = {}) => {
            const { bold = false, fontSize = 11, indent = 0, spacingAfter = 0 } = options;
            const font = bold ? helveticaBold : helvetica;
            const lines = splitTextForPdf(text, font, fontSize, textWidth - indent);
            const requiredHeight = Math.max(lines.length, 1) * PDF_LINE_HEIGHT + spacingAfter;
            ensureSpace(requiredHeight);
            lines.forEach((line) => {
              page.drawText(line, {
                x: PDF_PAGE_MARGIN + indent,
                y: cursorY,
                size: fontSize,
                font,
                color: rgb(0.1, 0.1, 0.1)
              });
              cursorY -= PDF_LINE_HEIGHT;
            });
            cursorY -= spacingAfter;
          };

          writeWrapped('Selected Policies', { bold: true, fontSize: 16 });
          writeWrapped(`View mode: ${formatPdfValue(els.viewMode.value)}`);
          writeWrapped(`Grouped by: ${formatPdfValue(els.groupBy.value)}`, { spacingAfter: 6 });

          grouped.forEach(([title, policies]) => {
            if (!groupStartPages.has(title)) {
              groupStartPages.set(title, pdfDoc.getPageCount());
            }

            writeWrapped(title, { bold: true, fontSize: 13, spacingAfter: 4 });

            policies.forEach((policy) => {
              const showCommentary = ['peruse', 'deep-dive'].includes(els.viewMode.value);
              const showActions = els.viewMode.value === 'deep-dive';
              const actionTitles = policy.actionIds.map(
                (id) => state.actionsById.get(id) || `${id} ${MISSING_ACTION_LABEL}`
              );
              const fields = [
                ['Policy', policy.policyText],
                ['Scope', policy.scope],
                ['Type', policy.type],
                ['Issue Areas', policy.issueAreas.join(', ')],
                ...(showCommentary ? [['Commentary', policy.commentary]] : []),
                ...(showActions ? [['Related Actions', actionTitles.join('; ')]] : [])
              ];

              writeWrapped(formatPdfValue(policy.id), { bold: true, fontSize: 12 });
              fields.forEach(([label, value]) => {
                writeWrapped(`${label}: ${formatPdfValue(value)}`, { indent: 10 });
              });
              cursorY -= 8;
            });
          });

          let tocCursorY = pageHeight - PDF_PAGE_MARGIN - PDF_TOC_TITLE_SIZE - 28;
          grouped.forEach(([title]) => {
            const entry = `${title}`;
            const pageNumber = groupStartPages.get(title);
            const numberLabel = String(pageNumber || '-');
            const numberWidth = helvetica.widthOfTextAtSize(numberLabel, 12);
            const maxEntryWidth = pageWidth - PDF_PAGE_MARGIN * 2 - numberWidth - 20;
            const entryLines = splitTextForPdf(entry, helvetica, 12, maxEntryWidth);

            const blockHeight = Math.max(entryLines.length, 1) * PDF_LINE_HEIGHT + 4;
            if (tocCursorY - blockHeight < PDF_CONTENT_BOTTOM_MARGIN) {
              return;
            }

            entryLines.forEach((line, index) => {
              tocPage.drawText(line, {
                x: PDF_PAGE_MARGIN,
                y: tocCursorY,
                size: 12,
                font: helvetica,
                color: rgb(0.08, 0.2, 0.4)
              });

              if (index === 0) {
                tocPage.drawText(numberLabel, {
                  x: pageWidth - PDF_PAGE_MARGIN - numberWidth,
                  y: tocCursorY,
                  size: 12,
                  font: helveticaBold,
                  color: rgb(0.08, 0.2, 0.4)
                });
              }

              tocCursorY -= PDF_LINE_HEIGHT;
            });
            tocCursorY -= 4;
          });

          const pages = pdfDoc.getPages();
          const totalPages = pages.length;
          pages.forEach((pdfPage, index) => {
            if (index === 0) {
              return;
            }

            const pageNumberLabel = String(index + 1);
            const pageNumberWidth = helvetica.widthOfTextAtSize(pageNumberLabel, PDF_FOOTER_TEXT_SIZE);
            pdfPage.drawImage(logoImage, {
              x: PDF_PAGE_MARGIN,
              y: 18,
              width: logoWidth,
              height: logoHeight
            });
            pdfPage.drawText(pageNumberLabel, {
              x: pageWidth - PDF_PAGE_MARGIN - pageNumberWidth,
              y: 24,
              size: PDF_FOOTER_TEXT_SIZE,
              font: helvetica,
              color: rgb(0.2, 0.2, 0.2)
            });
          });

          const pdfBytes = await pdfDoc.save();
          downloadPdfBlob(pdfBytes, buildPdfFilename());
        } catch (error) {
          alert(`Unable to generate PDF: ${error.message}`);
        }
      }

      function bindEvents() {
        [
          els.viewMode,
          els.groupBy,
          els.filterScope,
          els.filterType,
          els.filterIssueArea
        ].forEach((el) => el.addEventListener('change', render));

        els.selectAllVisible.addEventListener('change', (event) => {
          state.visiblePolicyIds.forEach((id) => {
            if (event.target.checked) {
              state.selectedPolicyIds.add(id);
            } else {
              state.selectedPolicyIds.delete(id);
            }
          });
          render();
        });

        els.shareBtn.addEventListener('click', copyShareLink);
        els.pdfBtn.addEventListener('click', downloadPdf);
      }

      function initializeFromQuery() {
        const params = new URLSearchParams(window.location.search);

        const view = params.get('view');
        if (['skim', 'peruse', 'deep-dive'].includes(view)) {
          els.viewMode.value = view;
        }

        const selected = splitMulti(params.get('selected'));
        selected.forEach((id) => state.selectedPolicyIds.add(id));

        state.onlySelectedFromLink = params.get('onlySelected') === '1' && selected.length > 0;
      }

      async function load() {
        const loadCsv = async (path, fallbackKey) => {
          try {
            const response = await fetch(path);
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            return await response.text();
          } catch (error) {
            if (fallbackData[fallbackKey]) {
              return fallbackData[fallbackKey];
            }
            throw new Error(`Failed to load ${path}: ${error.message}`);
          }
        };

        const [actionsText, policiesText] = await Promise.all([
          loadCsv('./actions.csv', 'actionsCsv'),
          loadCsv('./policies.csv', 'policiesCsv')
        ]);

        const actionRows = parseCsv(actionsText).filter((row) => ACTION_ID_PATTERN.test(row[0] || ''));
        const policyRows = parseCsv(policiesText).filter((row) => POLICY_ID_PATTERN.test(row[0] || ''));

        state.actionsById = new Map(actionRows.map((row) => [row[0], row[1] || 'Untitled Action']));
        state.policies = policyRows.map((row) => ({
          id: row[0],
          policyText: row[1],
          scope: row[2],
          type: row[3],
          issueAreas: splitMulti(row[4]),
          commentary: row[5],
          actionIds: splitMulti(row[6])
        }));

        setSelectOptions(els.filterScope, buildFilterOptions(state.policies.map((p) => p.scope)));
        setSelectOptions(els.filterType, buildFilterOptions(state.policies.map((p) => p.type)));
        setSelectOptions(
          els.filterIssueArea,
          buildFilterOptions(state.policies.flatMap((p) => p.issueAreas))
        );

        initializeFromQuery();
        bindEvents();
        render();
      }

      load().catch((err) => {
        const errorEl = document.createElement('p');
        errorEl.className = 'muted';
        errorEl.textContent = `Unable to load CSV files: ${err.message}`;
        els.policyGroups.replaceChildren(errorEl);
      });
    </script>
  </body>
</html>
